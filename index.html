<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Fadenkreuz */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 6px; height: 6px; transform: translate(-50%, -50%); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%; pointer-events: none; z-index: 5; }

        /* Start-Bildschirm */
        #blocker { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 15, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; color: #fff; text-align: center; cursor: pointer; }
        #instructions { padding: 30px; border: 1px solid rgba(255,255,255,0.1); background: #14141c; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 500px; }
        #instructions h2 { color: #ffffff; margin-top: 0; font-size: 24px; }
        .btn { margin-top: 20px; padding: 12px 30px; background: #00ddff; border: none; border-radius: 25px; color: #14141c; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }

        /* 2D-Bild-Overlay (Wenn man einen Raum betritt) */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 5, 0.95); z-index: 20; justify-content: center; align-items: center; flex-direction: column; }
        #room-photo { max-width: 80vw; max-height: 70vh; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); object-fit: contain; background: #222; }
        #room-tag { color: #00ddff; font-size: 26px; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px; }
        #exit-btn { margin-top: 20px; padding: 12px 35px; font-size: 16px; font-weight: bold; color: white; background: #aa0000; border: none; border-radius: 30px; cursor: pointer; }
        #exit-btn:hover { background: #ff5555; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLER WOHNUNGSRUNDGANG</h2>
            <p style="color: #a0a5b5; line-height: 1.6;">
               • <strong>Pfeiltasten (↑, ↓, ←, →)</strong> = Durch die Wohnung laufen<br>
               • <strong>Maus bewegen</strong> = Umsehen (Kopf drehen)<br>
               • <strong>Leertaste</strong> = Springen
            </p>
            <button class="btn">RUNDGANG STARTEN</button>
        </div>
    </div>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← RAUM VERLASSEN</button>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let prevTime = performance.now();
        let audioCtx;

        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -90, xMax: -40, zMin: -100, zMax: -40 },
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -90, xMax: -40, zMin: 10, zMax: 70 },
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 40, xMax: 90, zMin: -100, zMax: -40 },
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 40, xMax: 90, zMin: 10, zMax: 70 },
            { name: "BALKON", img: "balkon.jpg", xMin: -30, xMax: 30, zMin: -150, zMax: -110 }
        ];

        let insideRoom = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24); 
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.005);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 15, 110); 

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.6); sunLight.position.set(50, 200, 50); scene.add(sunLight);

            controls = new THREE.PointerLockControls(camera, document.body);
            
            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', function () {
                controls.lock();
                initAudio();
            });

            controls.addEventListener('lock', function () { blocker.style.display = 'none'; });
            controls.addEventListener('unlock', function () { if(!insideRoom) blocker.style.display = 'flex'; });

            scene.add(controls.getObject());

            // Pfeiltasten-Steuerung
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp': moveForward = true; break;
                    case 'ArrowLeft': moveLeft = true; break;
                    case 'ArrowDown': moveBackward = true; break;
                    case 'ArrowRight': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 200; canJump = false; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': moveForward = false; break;
                    case 'ArrowLeft': moveLeft = false; break;
                    case 'ArrowDown': moveBackward = false; break;
                    case 'ArrowRight': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);

            buildVirtualApartment();
        }

        function buildVirtualApartment() {
            const geo = new THREE.BoxGeometry(10, 10, 10);
            const matFloor = new THREE.MeshStandardMaterial({ color: 0x423830, roughness: 0.5 }); // Parkett-Stil
            const matWand = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.9 }); // Moderne Wände

            // Boden verlegen
            for(let z = -120; z <= 120; z+=10) {
                for(let x = -30; x <= 30; x+=10) {
                    const block = new THREE.Mesh(geo, matFloor); block.position.set(x, 0, z); scene.add(block);
                }
            }

            // Wände bauen mit Öffnungen
            for (let h = 10; h <= 30; h += 10) {
                for (let z = -130; z <= 130; z += 10) {
                    if (z === -70 || z === 40) continue; // Türöffnungen frei lassen
                    const wL = new THREE.Mesh(geo, matWand); wL.position.set(-35, h, z); scene.add(wL);
                    const wR = new THREE.Mesh(geo, matWand); wR.position.set(35, h, z); scene.add(wR);
                }
            }

            // Schilder über den Türen plazieren
            createSign(-32, 25, -70, "BADEZIMMER");
            createSign(-32, 25, 40, "ZIMMER 1");
            createSign(32, 25, -70, "ZIMMER 2");
            createSign(32, 25, 40, "ZIMMER 3");
            createSign(0, 25, -125, "BALKON");
        }

        function createSign(x, y, z, text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d'); canvas.width = 128; canvas.height = 64;
            ctx.fillStyle = '#1f1f2e'; ctx.fillRect(0,0,128,64);
            ctx.strokeStyle = '#00ddff'; ctx.lineWidth = 2; ctx.strokeRect(2,2,124,60);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText(text, 64, 38);
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(16, 8), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
            mesh.position.set(x, y, z);
            if(x !== 0) mesh.rotation.y = (x > 0) ? -Math.PI/2 : Math.PI/2;
            scene.add(mesh);
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [220.00, 246.94, 277.18, 329.63, 369.99]; // Ruhiger, moderner Ambient-Loop
            
            setInterval(() => {
                if (insideRoom) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 4.1);
            }, 4000);
        }

        function playRoomSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function checkRoomCollisions() {
            if (insideRoom) return;
            const pos = controls.getObject().position;

            for (let i = 0; i < rooms.length; i++) {
                const r = rooms[i];
                if (pos.x >= r.xMin && pos.x <= r.xMax && pos.z >= r.zMin && pos.z <= r.zMax) {
                    insideRoom = r;
                    controls.unlock();
                    playRoomSound();
                    document.getElementById('room-tag').innerText = r.name;
                    document.getElementById('room-photo').src = r.img;
                    document.getElementById('photo-overlay').style.display = 'flex';
                    break;
                }
            }
        }

        function leaveRoom() {
            document.getElementById('photo-overlay').style.display = 'none';
            insideRoom = null;
            const pos = controls.getObject().position;
            if (pos.x < 0) pos.x += 15;
            if (pos.x > 0) pos.x -= 15;
            if (pos.z < -100) pos.z += 15;
            controls.lock();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 15) {
                    velocity.y = 0;
                    controls.getObject().position.y = 15;
                    canJump = true;
                }

                checkRoomCollisions();
                prevTime = time;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
