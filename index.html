<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #080810; }
        
        /* Start-Bildschirm im absoluten Vordergrund */
        #blocker { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1a1a2e 0%, #05050f 100%); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; color: #fff; text-align: center; 
        }
        #instructions { 
            padding: 40px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 15, 25, 0.9); border-radius: 20px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); max-width: 500px; backdrop-filter: blur(10px);
        }
        #instructions h2 { color: #ffffff; margin-top: 0; font-size: 26px; letter-spacing: 1px; }
        #instructions p { color: #a0a5b5; line-height: 1.6; font-size: 14px; margin-bottom: 25px; }
        
        .char-selection { display: flex; gap: 30px; justify-content: center; }
        .btn-char { 
            padding: 16px 45px; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; 
            background: #1f1f35; color: white; font-size: 20px; font-weight: bold; 
            cursor: pointer; transition: all 0.25s ease; letter-spacing: 1px;
        }
        .btn-char:hover { border-color: #00ddff; transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 221, 255, 0.4); background: #252545; }

        /* 2D-Bild-Overlay für die Räume */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(4, 4, 8, 0.97); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }
        #room-photo { max-width: 85vw; max-height: 72vh; border-radius: 14px; box-shadow: 0 30px 70px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); object-fit: contain; background: #111; }
        #room-tag { color: #ffffff; font-size: 28px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,221,255,0.5); }
        #exit-btn { margin-top: 25px; padding: 14px 45px; font-size: 16px; font-weight: bold; color: white; background: #ff3b30; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); transition: transform 0.2s; }
        #exit-btn:hover { transform: scale(1.03); background: #ff453a; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLE ARCHITEKTUR-TOUR</h2>
            <p>
               Wähle deinen Charakter, um die Wohnung zu betreten.<br><br>
               • <b>Pfeiltasten (↑, ↓, ←, →)</b> = Avatar steuern<br>
               • <b>Zimmer betreten</b> = Laufe direkt durch die Türöffnungen<br>
               • <b>Bild schließen</b> = Beliebige Pfeiltaste drücken oder Klick
            </p>
            <div class="char-selection">
                <button class="btn-char" onclick="chooseAvatar('frau')">FRAU</button>
                <button class="btn-char" onclick="chooseAvatar('mann')">MANN</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← RAUM VERLASSEN</button>
    </div>
