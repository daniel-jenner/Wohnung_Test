<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtueller Immobilien-Rundgang</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #0c0c14; color: #fff; }
        
        #game-canvas { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Start-Bildschirm & Charakterauswahl */
        #blocker { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #0a0a14; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; text-align: center; 
        }
        #instructions { 
            padding: 35px; border: 1px solid rgba(255,255,255,0.1); 
            background: #111116; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            max-width: 500px; margin-bottom: 20px;
        }
        #instructions h2 { color: #ffffff; margin-top: 0; font-size: 24px; }
        #instructions p { color: #a0a5b5; line-height: 1.6; font-size: 14px; }
        
        .char-selection { display: flex; gap: 30px; justify-content: center; z-index: 10000; margin-top: 20px; }
        .btn-char { 
            padding: 15px 45px; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; 
            background: #1f1f2e; color: white; font-size: 22px; font-weight: bold; 
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-char:hover { border-color: #00ddff; transform: scale(1.1); box-shadow: 0 0 25px rgba(0, 221, 255, 0.5); }

        /* 2D-Bild-Overlay */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 8, 0.96); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }
        #room-photo { max-width: 80vw; max-height: 70vh; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); object-fit: contain; background: #111; }
        #room-tag { color: #ffffff; font-size: 26px; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        #exit-btn { margin-top: 25px; padding: 14px 40px; font-size: 16px; font-weight: bold; color: white; background: #ff3b30; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); }
        #exit-btn:hover { transform: scale(1.05); background: #ff453a; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLE IMMOBILIE</h2>
            <p>
               Willkommen zur Besichtigung! Wähle deinen Charakter, um zu beginnen.<br><br>
               Erkunde die Wohnung mit den <strong>Pfeiltasten (↑, ↓, ←, →)</strong>.<br>
               Gehe auf eine Tür zu, um den Raum zu betreten.<br>
               Nach dem Eintreten 2 Sek. warten. Verlassen per Pfeiltaste oder Klick.
            </p>
            <div class="char-selection">
                <button class="btn-char" onclick="chooseAvatar('frau')">FRAU</button>
                <button class="btn-char" onclick="chooseAvatar('mann')">MANN</button>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← RAUM VERLASSEN (Oder Pfeiltaste drücken)</button>
    </div>

    <script>
        let scene, camera, renderer, playerMesh;
        let moveUp = false, moveDown = false, moveLeft = false, moveRight = false;
        let audioCtx, stepInterval;
        let musicFilters = []; // Jetzt als Array, um alle Soundkanäle sauber zu dämpfen
        let insideRoom = null;
        let lastPlayerPos = new THREE.Vector3();
        let gameStarted = false;
        let canMove = true; 
        let moveTimeout = null;

        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -100, xMax: -50, zMin: -60, zMax: -20 },
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -100, xMax: -50, zMin: 40, zMax: 80 },
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 50, xMax: 100, zMin: -60, zMax: -20 },
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 50, xMax: 100, zMin: 40, zMax: 80 },
            { name: "BALKON", img: "balkon.jpg", xMin: -40, xMax: 40, zMin: -150, zMax: -110 }
        ];

        function chooseAvatar(gender) {
            document.getElementById('blocker').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'block';

            gameStarted = true;
            init(gender);
            initAudio();
            animate();
        }

        function init(gender) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a10);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 260, 150); 

            scene.add(new THREE.AmbientLight(0xffffff, 0.65));
            const mainLight = new THREE.DirectionalLight(0xfff5e6, 0.55);
            mainLight.position.set(20, 200, 50);
            scene.add(mainLight);

            // Flurboden
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.35, metalness: 0.05 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.set(0, -40, 0); scene.add(floor);

            // Zimmerböden
            const roomMat1 = new THREE.MeshStandardMaterial({ color: 0x243344, roughness: 0.6 }); 
            const roomMat2 = new THREE.MeshStandardMaterial({ color: 0x2d3a2d, roughness: 0.6 }); 
            const tileMat = new THREE.MeshStandardMaterial({ color: 0x33333b, roughness: 0.3 }); 

            createRoomFloor(tileMat, -75, -40, 50, 40);  
            createRoomFloor(roomMat1, -75, 60, 50, 40);  
            createRoomFloor(roomMat2, 75, -40, 50, 40);   
            createRoomFloor(roomMat1, 75, 60, 50, 40);    
            createRoomFloor(tileMat, 0, -135, 80, 40);   

            buildWohnungsWaende();

            // Spielfigur
            playerMesh = new THREE.Group();
            playerMesh.position.set(0, -40, 110); 
            buildHumanAvatar(gender);
            scene.add(playerMesh);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Tastatursteuerung
            window.addEventListener('keydown', e => { 
                if (!canMove && gameStarted) return;
                if (e.code === 'ArrowUp') { moveUp = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowDown') { moveDown = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowLeft') { moveLeft = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowRight') { moveRight = true; if(insideRoom) leaveRoom(); }
            });
            window.addEventListener('keyup', e => { 
                if (e.code === 'ArrowUp') moveUp = false;
                if (e.code === 'ArrowDown') moveDown = false;
                if (e.code === 'ArrowLeft') moveLeft = false;
                if (e.code === 'ArrowRight') moveRight = false;
            });
            window.addEventListener('resize', onWindowResize);
        }

        function createRoomFloor(material, x, z, w, h) {
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
            mesh.rotation.x = -Math.PI / 2; mesh.position.set(x, -39.9, z); scene.add(mesh);
        }

        function buildWohnungsWaende() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xe2e4e9, roughness: 0.7 });

            createWall(8, 50, 60, -50, -15, -120, wallMat); 
            createWall(8, 50, 40, -50, -15, 0, wallMat);   
            createWall(8, 50, 70, -50, -15, 115, wallMat); 

            createWall(8, 50, 60, 50, -15, -120, wallMat);  
            createWall(8, 50, 40, 50, -15, 0, wallMat);    
            createWall(8, 50, 70, 50, -15, 115, wallMat);  

            createWall(42, 50, 8, -29, -15, -150, wallMat);
            createWall(42, 50, 8, 29, -15, -150, wallMat);

            // Dekorationselemente an den Flurwänden
            createPlant(-40, -135);
            createPlant(40, -135);
            createPlant(-40, 20);
            createPlant(40, 20);

            createWallPicture(-45, 10, -80, 0x553311);
            createWallPicture(45, 10, -80, 0x113355);

            createFloorSign(-36, -40, "BADEZIMMER");
            createFloorSign(-36, 60, "ZIMMER 1");
            createFloorSign(36, -40, "ZIMMER 2");
            createFloorSign(36, 60, "ZIMMER 3");
            createFloorSign(0, -122, "BALKON");
        }

        function createWall(w, h, d, x, y, z, mat) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w
