<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtueller Immobilien-Rundgang</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #10101a; color: #fff; }
        
        #game-canvas { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Start-Bildschirm & Charakterauswahl */
        #blocker { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a14 100%); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; text-align: center; 
        }
        #instructions { 
            padding: 40px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(20, 20, 30, 0.8); border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.7); 
            max-width: 550px; margin-bottom: 30px; backdrop-filter: blur(10px);
        }
        #instructions h2 { color: #fff; margin-top: 0; font-size: 28px; letter-spacing: 1px; }
        #instructions p { color: #b0b0c0; line-height: 1.7; font-size: 15px; }
        
        .char-selection { display: flex; gap: 35px; justify-content: center; z-index: 10000; margin-top: 30px;}
        .btn-char { 
            padding: 18px 50px; border: 2px solid rgba(255,255,255,0.15); border-radius: 18px; 
            background: #1f1f3a; color: white; font-size: 20px; font-weight: bold; 
            cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
        }
        .btn-char:hover { border-color: #88ccff; transform: translateY(-5px) scale(1.03); box-shadow: 0 10px 30px rgba(100, 200, 255, 0.3); background: #252545; }

        /* 2D-Bild-Overlay */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 10, 0.97); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px); }
        #room-photo { max-width: 85vw; max-height: 75vh; border-radius: 15px; box-shadow: 0 30px 80px rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.05); object-fit: contain; background: #111; transition: opacity 0.5s ease; opacity: 0;}
        #room-photo.loaded { opacity: 1; }
        #room-tag { color: #fff; font-size: 30px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        #exit-btn { margin-top: 30px; padding: 15px 45px; font-size: 17px; font-weight: bold; color: white; background: #e63946; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4); transition: all 0.3s ease; letter-spacing: 1px; }
        #exit-btn:hover { transform: translateY(-3px); background: #f04856; box-shadow: 0 10px 30px rgba(230, 57, 70, 0.5); }
        
        #loading-bar-container { width: 80%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 25px; overflow: hidden; display: none; }
        #loading-bar { width: 0%; height: 100%; background: #00ddff; transition: width 0.3s ease; box-shadow: 0 0 10px #00ddff; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLER IMMOBILIEN-RUNDGANG</h2>
            <p>
               Willkommen zur Besichtigung! Wähle deinen Charakter, um zu beginnen.<br><br>
               Erkunde die Wohnung mit den <strong>Pfeiltasten (↑, ↓, ←, →)</strong>.<br>
               Gehe auf eine Tür zu, um den Raum zu betreten.<br>
               Drücke eine Pfeiltaste oder klicke auf den Button, um zurückzukehren.
            </p>
            <div class="char-selection">
                <button class="btn-char" onclick="chooseAvatar('frau')">FRAU</button>
                <button class="btn-char" onclick="chooseAvatar('mann')">MANN</button>
            </div>
            <div id="loading-bar-container"><div id="loading-bar"></div></div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht" onload="this.classList.add('loaded')">
        <button id="exit-btn" onclick="leaveRoom()">← ZURÜCK (Oder Pfeiltaste drücken)</button>
    </div>

    <script>
        let scene, camera, renderer, playerMesh, gltfLoader;
        let moveUp = false, moveDown = false, moveLeft = false, moveRight = false;
        let audioCtx, musicSource, gainNode, stepInterval;
        let insideRoom = null;
        let lastPlayerPos = new THREE.Vector3();
        let gameStarted = false;
        let canMove = true; // Neu: Steuerungsverzögerung
        let moveTimeout;

        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -90, xMax: -50, zMin: -60, zMax: -20 },
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -90, xMax: -50, zMin: 40, zMax: 80 },
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 50, xMax: 90, zMin: -60, zMax: -20 },
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 50, xMax: 90, zMin: 40, zMax: 80 },
            { name: "BALKON", img: "balkon.jpg", xMin: -30, xMax: 30, zMin: -145, zMax: -115 }
        ];

        function chooseAvatar(gender) {
            const loadingBarContainer = document.getElementById('loading-bar-container');
            const loadingBar = document.getElementById('loading-bar');
            loadingBarContainer.style.display = 'block';
            
            // Simuliere Ladefortschritt
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                loadingBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('blocker').style.display = 'none';
                    document.getElementById('game-canvas').style.display = 'block';
                    gameStarted = true;
                    init(gender);
                    initAudio();
                    animate();
                }
            }, 50);
        }

        function init(gender) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 100, 500);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 220, 180); // Etwas tiefer und näher für mehr Immersion

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const mainLight = new THREE.DirectionalLight(0xfffaf0, 0.7);
            mainLight.position.set(30, 150, 60);
            scene.add(mainLight);

            // --- REALISTISCHERER VIRTUELLER RAUM ---
            // Flurboden: Dunkles Holzparkett
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.6, metalness: 0.1 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.set(0, -40, 0); scene.add(floor);

            // Zimmerböden: Teppich & Fliesen
            const roomMat1 = new THREE.MeshStandardMaterial({ color: 0x2a3b4c, roughness: 0.8 }); // Blauer Teppich
            const roomMat2 = new THREE.MeshStandardMaterial({ color: 0x3d4d3d, roughness: 0.8 }); // Grüner Teppich
            const tileMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3 }); // Graue Fliesen

            createRoomFloor(tileMat, -70, -40, 40, 40);  // Bad
            createRoomFloor(roomMat1, -70, 60, 40, 40);  // Zimmer 1
            createRoomFloor(roomMat2, 70, -40, 40, 40);   // Zimmer 2
            createRoomFloor(roomMat1, 70, 60, 40, 40);    // Zimmer 3
            createRoomFloor(tileMat, 0, -130, 70, 40);   // Balkon

            buildWohnungsWaende();

            // Spielfigur
            playerMesh = new THREE.Group();
            playerMesh.position.set(0, -40, 110); 
            buildHumanAvatar(gender);
            scene.add(playerMesh);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;

            // Tastatursteuerung
            window.addEventListener('keydown', e => { 
                if (!canMove && gameStarted) return; // Neu: Bewegung sperren
                if (e.code === 'ArrowUp') { moveUp = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowDown') { moveDown = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowLeft') { moveLeft = true; if(insideRoom) leaveRoom(); }
                if (e.code === 'ArrowRight') { moveRight = true; if(insideRoom) leaveRoom(); }
            });
            window.addEventListener('keyup', e => { 
                if (e.code === 'ArrowUp') moveUp = false;
                if (e.code === 'ArrowDown') moveDown = false;
                if (e.code === 'ArrowLeft') moveLeft = false;
                if (e.code === 'ArrowRight') moveRight = false;
            });
            window.addEventListener('resize', onWindowResize);
        }

        function createRoomFloor(material, x, z, w, h) {
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
            mesh.rotation.x = -Math.PI / 2; mesh.position.set(x, -39.9, z); scene.add(mesh);
        }

        function buildWohnungsWaende() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeece8, roughness: 0.9 }); // Heller Cremeton
            const doorFrameMat = new THREE.MeshStandardMaterial({ color: 0x221a15 }); // Dunkles Holz für Rahmen

            // Flurwände links & rechts mit Türöffnungen
            createWall(8, 60, 60, -50, -10, -110, wallMat); 
            createWall(8, 60, 40, -50, -10, 0, wallMat);   
            createWall(8, 60, 70, -50, -10, 115, wallMat); 

            createWall(8, 60, 60, 50, -10, -120, wallMat);  
            createWall(8, 60, 40, 50, -10, 0, wallMat);    
            createWall(8, 60, 70, 50, -10, 115, wallMat);  

            // Querwände hinten am Balkon mit Fenster
            createWall(42, 60, 8, -29, -10, -150, wallMat);
            createWall(42, 60, 8, 29, -10, -150, wallMat);
            
            // Fenster am Balkonende
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, roughness: 0.1, metalness: 0.8 });
            createWall(16, 40, 2, 0, 0, -150, windowMat); // Fensterscheibe
            createWall(16, 2, 8, 0, 19, -150, doorFrameMat); // Oberer Rahmen
            createWall(16, 2, 8, 0, -19, -150, doorFrameMat); // Unterer Rahmen
            createWall(2, 40, 8, -8, 0, -150, doorFrameMat); // Linker Rahmen
            createWall(2, 40, 8, 8, 0, -150, doorFrameMat); // Rechter Rahmen

            // Raumbeschriftung auf dem Boden (angepasst für bessere Lesbarkeit)
            createFloorSign(-70, -40,
