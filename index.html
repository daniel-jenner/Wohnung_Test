<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; background-color: #080810; }
        
        #blocker { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #080810; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; color: #fff; text-align: center; 
        }
        
        .btn-char { 
            padding: 20px 50px; margin: 10px; font-size: 24px; cursor: pointer;
            background: #1f1f35; border: 2px solid #333; color: white; border-radius: 15px;
        }
        .btn-char:hover { background: #333355; border-color: #00ddff; }

        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }
        #exit-btn { margin-top: 20px; padding: 15px 30px; background: #ff3b30; color: white; border: none; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <h1>Wähle deinen Charakter</h1>
        <button class="btn-char" onclick="initGame('mann')">MANN</button>
        <button class="btn-char" onclick="chooseFrau()">FRAU</button>
    </div>

    <div id="photo-overlay">
        <img id="room-photo" src="" style="max-width:80%; max-height:70%;">
        <button id="exit-btn" onclick="leaveRoom()">ZURÜCK</button>
    </div>

    <script>
        // Kleiner Trick: Funktion direkt im onclick definiert, um Namespace-Konflikte zu vermeiden
        function chooseFrau() { initGame('frau'); }

        function initGame(gender) {
            document.getElementById('blocker').style.display = 'none';
            
            // Erst jetzt erzeugen wir das Canvas-Element
            const canvas = document.createElement('canvas');
            canvas.id = 'game-canvas';
            canvas.style.display = 'block';
            document.body.appendChild(canvas);

            // Drei.js Logik...
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Minimaler Test-Würfel zur Überprüfung
            const geometry = new THREE.BoxGeometry();
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        function leaveRoom() { document.getElementById('photo-overlay').style.display = 'none'; }
    </script>
</body>
</html>
