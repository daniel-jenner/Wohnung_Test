<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #080810; }
        
        #blocker { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1a1a2e 0%, #05050f 100%); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; color: #fff; text-align: center; 
        }
        #instructions { 
            padding: 40px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 15, 25, 0.9); border-radius: 20px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); max-width: 500px; backdrop-filter: blur(10px);
        }
        #instructions h2 { color: #ffffff; margin-top: 0; font-size: 26px; letter-spacing: 1px; }
        #instructions p { color: #a0a5b5; line-height: 1.6; font-size: 14px; margin-bottom: 25px; }
        
        .char-selection { display: flex; gap: 30px; justify-content: center; }
        .btn-char { 
            position: relative; z-index: 10001; /* Garantiert anklickbar */
            padding: 16px 45px; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; 
            background: #1f1f35; color: white; font-size: 20px; font-weight: bold; 
            cursor: pointer; transition: all 0.25s ease; letter-spacing: 1px;
        }
        .btn-char:hover { border-color: #00ddff; transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 221, 255, 0.4); background: #252545; }

        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(4, 4, 8, 0.97); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }
        #room-photo { max-width: 85vw; max-height: 72vh; border-radius: 14px; box-shadow: 0 30px 70px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); object-fit: contain; background: #111; }
        #room-tag { color: #ffffff; font-size: 28px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,221,255,0.5); }
        #exit-btn { margin-top: 25px; padding: 14px 45px; font-size: 16px; font-weight: bold; color: white; background: #ff3b30; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); transition: transform 0.2s; }
        #exit-btn:hover { transform: scale(1.03); background: #ff453a; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLE ARCHITEKTUR-TOUR</h2>
            <p>
               Wähle deinen Charakter, um die Wohnung zu betreten.<br><br>
               • <b>Pfeiltasten (↑, ↓, ←, →)</b> = Avatar steuern<br>
               • <b>Zimmer betreten</b> = Laufe direkt durch die Türöffnungen<br>
               • <b>Bild schließen</b> = Beliebige Pfeiltaste drücken oder Klick
            </p>
            <div class="char-selection">
                <button class="btn-char" onclick="chooseAvatar('frau')">FRAU</button>
                <button class="btn-char" onclick="chooseAvatar('mann')">MANN</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← RAUM VERLASSEN</button>
    </div>

    <script>
        let scene, camera, renderer, playerMesh;
        let moveUp = false, moveDown = false, moveLeft = false, moveRight = false;
        let audioCtx = null, stepInterval, loopInterval, musicNodes = [];
        let insideRoom = null, gameStarted = false, canMove = true, moveTimeout = null;
        let lastPlayerPos = new THREE.Vector3();

        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -50, xMax: -38, zMin: -65, zMax: -15 },
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -50, xMax: -38, zMin: 35, zMax: 85 },
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 38, xMax: 50, zMin: -65, zMax: -15 },
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 38, xMax: 50, zMin: 35, zMax: 85 },
            { name: "BALKON", img: "balkon.jpg", xMin: -30, xMax: 30, zMin: -150, zMax: -125 }
        ];

        function chooseAvatar(gender) {
            // Audio-System MUSS synchron mit dem Mausklick gestartet werden
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            document.getElementById('blocker').style.display = 'none';

            // Canvas dynamisch erzeugen (verhindert Klick-Blockaden)
            setTimeout(() => {
                let canvas = document.createElement('canvas');
                canvas.id = 'game-canvas';
                canvas.style.width = '100vw';
                canvas.style.height = '100vh';
                canvas.style.position = 'absolute';
                canvas.style.top = '0'; canvas.style.left = '0'; canvas.style.zIndex = '1';
                document.body.appendChild(canvas);

                gameStarted = true;
                initEngine(gender, canvas);
                initAudioSystem();
                animate();
            }, 50);
        }

        function initEngine(gender, canvasElement) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 250, 140);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xfff5ea, 0.6); light.position.set(30, 200, 60); scene.add(light);

            const floorMat = new THREE.MeshStandardMaterial({ color: 0x36251c, roughness: 0.35, metalness: 0.1 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 300), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.set(0, -40, 0); scene.add(floor);

            buildApartmentStructures();

            playerMesh = new THREE.Group();
            playerMesh.position.set(0, -40, 110); 
            buildHumanAvatar(gender);
            scene.add(playerMesh);

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            window.addEventListener('keydown', e => { 
                if (!canMove && gameStarted) return;
                if (e.key === 'ArrowUp') { moveUp = true; if(insideRoom) leaveRoom(); }
                if (e.key === 'ArrowDown') { moveDown = true; if(insideRoom) leaveRoom(); }
                if (e.key === 'ArrowLeft') { moveLeft = true; if(insideRoom) leaveRoom(); }
                if (e.key === 'ArrowRight') { moveRight = true; if(insideRoom) leaveRoom(); }
            });
            window.addEventListener('keyup', e => { 
                if (e.key === 'ArrowUp') moveUp = false;
                if (e.key === 'ArrowDown') moveDown = false;
                if (e.key === 'ArrowLeft') moveLeft = false;
                if (e.key === 'ArrowRight') moveRight = false;
            });
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function buildApartmentStructures() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xdedcd8, roughness: 0.8 }); 
            const trimMat = new THREE.MeshStandardMaterial({ color: 0x1f1a17 }); 

            createWall(6, 60, 60, -40, -10, -120, wallMat); 
            createWall(6, 60, 40, -40, -10, 0, wallMat);   
            createWall(6, 60, 70, -40, -10, 115, wallMat); 

            createWall(6, 60, 60, 40, -10, -120, wallMat);  
            createWall(6, 60, 40, 40, -10, 0, wallMat);    
            createWall(6, 60, 70, 40, -10, 115, wallMat);  

            createWall(32, 60, 6, -24, -10, -150, wallMat);
            createWall(32, 60, 6, 24, -10, -150, wallMat);

            createPlant(-34, -142); createPlant(34, -142); createPlant(-34, 25); createPlant(34, 25);
            createWallPicture(-39.5, 12, -80, 0x4a5b6c); createWallPicture(39.5, 12, -80, 0x6c5a4a);

            createFloorSign(-24, -40, "BADEZIMMER");
            createFloorSign(-24, 60, "ZIMMER 1");
            createFloorSign(24, -40, "ZIMMER 2");
            createFloorSign(24, 60, "ZIMMER 3");
            createFloorSign(0, -130, "BALKON");
        }

        function createWall(w, h, d, x, y, z, mat) { const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); mesh.position.set(x, y, z); scene.add(mesh); }
        function createPlant(x, z) { const pot = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 1.8, 5), new THREE.MeshStandardMaterial({ color: 0x7a4a35 })); pot.position.set(x, -37.5, z); const leaves = new THREE.Mesh(new THREE.SphereGeometry(3.8, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2e5c1e, roughness: 0.9 })); leaves.position.set(x, -33, z); scene.add(pot, leaves); }
        function createWallPicture(x, y, z, hexColor) { const frame = new THREE.Mesh(new THREE.BoxGeometry(1, 16, 22), new THREE.MeshStandardMaterial({ color: 0x111111 })); frame.position.set(x, y, z); const canvasMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 14, 20), new THREE.MeshStandardMaterial({ color: hexColor })); canvasMesh.position.set(x, y, z); scene.add(frame, canvasMesh); }
        
        function createFloorSign(x, z, text) {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); canvas.width = 256; canvas.height = 64;
            ctx.fillStyle = 'rgba(15, 15, 25, 0.8)'; ctx.fillRect(0,0,256,64);
            ctx.strokeStyle = '#00ddff'; ctx.lineWidth = 4; ctx.strokeRect(2,2,252,60);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(text, 128, 41);
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(28, 7), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            mesh.position.set(x, -39.8, z); mesh.rotation.x = -Math.PI / 2; scene.add(mesh);
        }

        function buildHumanAvatar(gender) {
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x162238 }), skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac }), shirtMat = new THREE.MeshStandardMaterial({ color: (gender === 'frau') ? 0xcc3355 : 0x2266aa }), hairMat = new THREE.MeshStandardMaterial({ color: (gender === 'frau') ? 0x884411 : 0x221105 });
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 12), pantsMat); legL.position.set(-2, 6, 0);
            const legR = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.4, 12), pantsMat); legR.position.set(2, 6, 0);
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(3.8, 3.2, 14), shirtMat); torso.position.y = 19;
            const head = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), skinMat); head.position.y = 29;
            const hair = new THREE.Mesh(new THREE.SphereGeometry(4.3, 16, 16), hairMat); hair.position.set(0, 29.5, -0.3);
            playerMesh.add(legL, legR, torso, head, hair);
        }

        function initAudioSystem() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playLoungeMusicLoop();
            stepInterval = setInterval(() => {
                if ((moveUp || moveDown || moveLeft || moveRight) && !insideRoom && canMove) playFootstep();
            }, 350);
        }

        function playLoungeMusicLoop() {
            if (!gameStarted) return;
            musicNodes.forEach(n => { try { n.stop(); } catch(e){} }); musicNodes = [];
            triggerLoungeChord(130.81, 0); 
            triggerLoungeChord(164.81, 2000); 
            triggerLoungeChord(196.00, 4000); 
            loopInterval = setTimeout(playLoungeMusicLoop, 6500);
        }

        function triggerLoungeChord(freq, delay) {
            setTimeout(() => {
                if (insideRoom || !gameStarted || !audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1.5);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 4.1);
                musicNodes.push(osc);
            }, delay);
        }

        function playFootstep() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(55 + Math.random() * 10, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.13);
        }

        function leaveRoom() {
            document.getElementById('photo-overlay').style.display = 'none';
            insideRoom = null;
            if (playerMesh) {
                playerMesh.position.copy(lastPlayerPos);
                if (playerMesh.position.x < 0) playerMesh.position.x += 16;
                else if (playerMesh.position.x > 0) playerMesh.position.x -= 16;
                if (playerMesh.position.z < -100) playerMesh.position.z += 16;
            }
            moveUp = moveDown = moveLeft = moveRight = false;
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);

            if (!insideRoom && playerMesh && canMove) {
                const speed = 2.0; let moved = false;
                if (moveUp) { playerMesh.position.z -= speed; playerMesh.rotation.y = Math.PI; moved = true; }
                if (moveDown) { playerMesh.position.z += speed; playerMesh.rotation.y = 0; moved = true; }
                if (moveLeft) { playerMesh.position.x -= speed; playerMesh.rotation.y = -Math.PI / 2; moved = true; }
                if (moveRight) { playerMesh.position.x += speed; playerMesh.rotation.y = Math.PI / 2; moved = true; }

                if (moved) {
                    const time = Date.now() * 0.012;
                    playerMesh.children[0].rotation.x = Math.sin(time) * 0.6;
                    playerMesh.children[1].rotation.x = -Math.sin(time) * 0.6;
                } else {
                    playerMesh.children[0].rotation.x = 0; playerMesh.children[1].rotation.x = 0;
                }

                playerMesh.position.x = Math.max(-36, Math.min(36, playerMesh.position.x));
                playerMesh.position.z = Math.max(-145, Math.min(145, playerMesh.position.z));

                camera.position.x = playerMesh.position.x;
                camera.position.z = playerMesh.position.z + 115;
                camera.lookAt(playerMesh.position.x, playerMesh.position.y + 10, playerMesh.position.z);

                const pos = playerMesh.position;
                for (let r of rooms) {
                    if (pos.x >= r.xMin && pos.x <= r.xMax && pos.z >= r.zMin && pos.z <= r.zMax) {
                        lastPlayerPos.copy(pos); insideRoom = r;
                        document.getElementById('room-tag').innerText = r.name;
                        document.getElementById('room-photo').src = r.img;
                        document.getElementById('photo-overlay').style.display = 'flex';
                        
                        canMove = false;
                        moveUp = moveDown = moveLeft = moveRight = false;
                        clearTimeout(moveTimeout);
                        moveTimeout = setTimeout(() => { canMove = true; }, 2000);
                        break;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
