<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuelle 3D Wohnungswelt</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* Elegantes Gaming-UI */
        #ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334466;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 10;
            max-width: 320px;
        }
        #room-title {
            font-size: 20px;
            font-weight: bold;
            color: #00ddff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #instructions {
            color: #ccc;
            font-size: 13px;
            line-height: 1.5;
        }
        /* Fadenkreuz in der Mitte für echtes First-Person-Gefühl */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(250, 250, 250, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

        </div>
    </div>
