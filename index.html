<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Realism 3D Virtual Apartment</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background-color: #050508; }
        canvas { width: 100vw; height: 100vh; display: block; }
        
        /* Cinematic UI overlay */
        #ui-container { 
            position: fixed; top: 30px; left: 30px; 
            background: rgba(10, 10, 15, 0.85); color: #fff; 
            padding: 25px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(12px); pointer-events: none; z-index: 10; max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }
        #room-title { font-size: 22px; font-weight: 600; color: #ffffff; margin-bottom: 6px; letter-spacing: 0.5px; }
        #room-subtitle { font-size: 13px; color: #00ddff; text-transform: uppercase; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        #instructions { color: #a0a5b5; font-size: 13px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        
        /* Minimalistisches, feines Fadenkreuz (Kino-Look) */
        #crosshair { 
            position: fixed; top: 50%; left: 50%; width: 6px; height: 6px; 
            transform: translate(-50%, -50%); border: 1.5px solid rgba(255, 255, 255, 0.7); 
            border-radius: 50%; pointer-events: none; z-index: 5; 
        }
        
        /* Weicher Cinematic Blende-Effekt beim Raumwechsel */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; opacity: 0; pointer-events: none; z-index: 20;
            transition: opacity 0.4s ease-in-out;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="fade-overlay"></div>
    
    <div id="ui-container">
        <div id="room-title">Wohnung</div>
        <div id="room-subtitle">Exklusiver Rundgang</div>
        <div id="instructions">
            • Maus gedrückt halten & ziehen für feinen Rundumblick.<br>
            • Fadenkreuz auf eine Klinke/Tür richten und klicken zum Eintreten.
        </div>
    </div>

    <script>
        let scene, camera, renderer, roomMesh, textureLoader;
        let isUserInteracting = false, lon = 0, lat = 0;
        let onPointerDownMouseX = 0, onPointerDownMouseY = 0, onPointerDownLon = 0, onPointerDownLat = 0;
        let phi = 0, theta = 0, raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        let doors = [], isTransitioning = false;

        const apartment = {
            flur: {
                name: "Zentraler Flur", subtitle: "Eingangsbereich", image: "flur.jpg",
                doors: [
                    { w: 42, h: 95, x: -195, y: -25, z: -90, rotY: Math.PI/2, target: "zimmer1", color: 0x2c2520, label: "Zimmer 1" },
                    { w: 42, h: 95, x: -195, y: -25, z: 90,  rotY: Math.PI/2, target: "zimmer2", color: 0x2c2520, label: "Zimmer 2" },
                    { w: 42, h: 95, x: 195,  y: -25, z: -90, rotY: -Math.PI/2, target: "zimmer3", color: 0x2c2520, label: "Zimmer 3" },
                    { w: 42, h: 95, x: 195,  y: -25, z: 90,  rotY: -Math.PI/2, target: "bad",    color: 0x3d4a56, label: "Badezimmer" },
                    { w: 65, h: 100, x: 0,   y: -22, z: -195, rotY: 0,         target: "balkon", color: 0xeeeeee, label: "Balkon" }
                ]
            },
            zimmer1: { name: "Zimmer 1", subtitle: "Wohnbereich", image: "zimmer1.jpg", doors: [{ w: 42, h: 95, x: 0, y: -25, z: 195, rotY: 0, target: "flur", color: 0x2c2520, label: "Flur" }] },
            zimmer2: { name: "Zimmer 2", subtitle: "Schlafbereich", image: "zimmer2.jpg", doors: [{ w: 42, h: 95, x: 0, y: -25, z: 195, rotY: 0, target: "flur", color: 0x2c2520, label: "Flur" }] },
            zimmer3: { name: "Zimmer 3", subtitle: "Arbeitszimmer", image: "zimmer3.jpg", doors: [{ w: 42, h: 95, x: 0, y: -25, z: 195, rotY: 0, target: "flur", color: 0x2c2520, label: "Flur" }] },
            bad:     { name: "Badezimmer", subtitle: "Wellnessoase", image: "bad.jpg",     doors: [{ w: 42, h: 95, x: 0, y: -25, z: 195, rotY: 0, target: "flur", color: 0x3d4a56, label: "Flur" }] },
            balkon:  { name: "Außenbalkon", subtitle: "Panoramablick", image: "balkon.jpg",  doors: [{ w: 55, h: 95, x: 0, y: -25, z: 195, rotY: 0, target: "flur", color: 0xeeeeee, label: "Flur" }] }
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            
            // Kamera mit natürlichem Sichtfeld (Human Eye FOV)
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            textureLoader = new THREE.TextureLoader();

            // --- REALISTISCHES LICHTKONZEPT ---
            // Weiches, warmes Raum-Grundlicht
            const ambientLight = new THREE.AmbientLight(0xfff6e0, 0.75);
            scene.add(ambientLight);

            // Spot-Deckenleuchte für plastische Schattenbildung an den Türen
            const ceilingLight = new THREE.PointLight(0xffffff, 0.8, 400);
            ceilingLight.position.set(0, 150, 0);
            scene.add(ceilingLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Scharfe Kanten
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Kino-Farbkorrektur für Foto-Realismus
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            document.addEventListener('pointerdown', onPointerDown);
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
            document.addEventListener('click', onSceneClick);
            window.addEventListener('resize', onWindowResize);

            goToRoom("flur");
        }

        function goToRoom(roomId) {
            const room = apartment[roomId];
            if (!room) return;

            document.getElementById('room-title').innerText = room.name;
            document.getElementById('room-subtitle').innerText = room.subtitle;

            if (roomMesh) scene.remove(roomMesh);

            // Lade die Wandtapete (Dein Foto)
            textureLoader.load(room.image, function(texture) {
                // High-Quality Texturfilterung gegen Unschärfe bei Bewegung
                texture.generateMipmaps = true;
                texture.minFilter = THREE.LinearMipmapLinearFilter;
                
                const geometry = new THREE.BoxGeometry(400, 400, 400);
                
                // Realistisches Material, das auf Deckenleuchten reagiert
                const materials = Array(6).fill(new THREE.MeshStandardMaterial({ 
                    map: texture, 
                    side: THREE.BackSide,
                    roughness: 0.6,
                    metalness: 0.1
                }));
                
                roomMesh = new THREE.Mesh(geometry, materials);
                scene.add(roomMesh);
            });

            // Alte Türen abbauen
            doors.forEach(door => scene.remove(door));
            doors = [];

            // Neue, architektonisch präzise 3D-Türen einsetzen
            room.doors.forEach(d => {
                const doorGroup = new THREE.Group();
                doorGroup.position.set(d.x, d.y, d.z);
                doorGroup.rotation.y = d.rotY;

                // 1. Der edle Türrahmen (Zarge)
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.7 });
                const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(4, d.h + 4, 8), frameMat);
                frameLeft.position.set(-d.w/2 - 2, 2, 0);
                const frameRight = frameLeft.clone();
                frameRight.position.x = d.w/2 + 2;
                const frameTop = new THREE.Mesh(new THREE.BoxGeometry(d.w + 8, 4, 8), frameMat);
                frameTop.position.set(0, d.h/2 + 2, 0);
                doorGroup.add(frameLeft, frameRight, frameTop);

                // 2. Das schwere Türblatt (wird am linken Rand verankert für echtes Aufschwingen)
                const doorPivot = new THREE.Group();
                doorPivot.position.set(-d.w/2, 0, 0); // Scharnier-Achse links
                
                const panelMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(d.w, d.h, 4), 
                    new THREE.MeshStandardMaterial({ color: d.color, roughness: 0.5, metalness: 0.05 })
                );
                panelMesh.position.set(d.w/2, 0, 0); // Verschiebung, damit Kante am Pivot liegt
                doorPivot.add(panelMesh);

                // 3. Ergonomische Design-Klinke aus mattem Chrom
                const handleMat = new THREE.MeshStandardMaterial({ color: 0xb0b5bc, metalness: 0.85, roughness: 0.15 });
                const handleL = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 7, 12), handleMat);
                handleL.rotation.z = Math.PI / 2;
                handleL.position.set(d.w - 6, 0, 3.5);
                doorPivot.add(handleL);

                doorGroup.add(doorPivot);
                doorGroup.userData = { targetRoom: d.target, pivot: doorPivot };

                scene.add(doorGroup);
                doors.push(doorGroup);
            });
        }

        function onSceneClick() {
            if (isUserInteracting || isTransitioning) return;

            mouse.x = 0; mouse.y = 0; // Strahl schießt präzise durch die Bildschirm
