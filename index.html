<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #05050a; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Start-Bildschirm & Charakterauswahl */
        #blocker { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 15, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; color: #fff; text-align: center; pointer-events: auto; }
        #instructions { padding: 35px; border: 1px solid rgba(255,255,255,0.1); background: #111116; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-width: 500px; backdrop-filter: blur(10px); pointer-events: auto; }
        #instructions h2 { color: #ffffff; margin-top: 0; font-size: 24px; letter-spacing: 0.5px; }
        
        .char-selection { display: flex; gap: 30px; justify-content: center; margin-top: 25px; pointer-events: auto; }
        .btn-char { padding: 15px 45px; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; background: #1f1f2e; color: white; font-size: 22px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; line-height: 1; pointer-events: auto; position: relative; z-index: 35; }
        .btn-char:hover { border-color: #00ddff; transform: scale(1.1); box-shadow: 0 0 25px rgba(0, 221, 255, 0.5); }

        /* 2D-Bild-Overlay (Wenn man einen Raum betritt) */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 8, 0.96); z-index: 20; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        #room-photo { max-width: 80vw; max-height: 70vh; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); object-fit: contain; background: #111; }
        #room-tag { color: #ffffff; font-size: 26px; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        #exit-btn { margin-top: 25px; padding: 14px 40px; font-size: 16px; font-weight: bold; color: white; background: #ff3b30; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); transition: transform 0.2s; pointer-events: auto; }
        #exit-btn:hover { transform: scale(1.05); background: #ff453a; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h2>VIRTUELLE EXKLUSIV-WOHNUNG</h2>
            <p style="color: #a0a5b5; line-height: 1.6; font-size: 14px;">
               Bitte wähle deinen Avatar aus, um den Rundgang zu starten.<br>
               Steuerung danach über die <strong>Pfeiltasten (↑, ↓, ←, →)</strong> der Tastatur.
            </p>
            <div class="char-selection">
                <button class="btn-char" onclick="startGame('frau')">FRAU</button>
                <button class="btn-char" onclick="startGame('mann')">MANN</button>
            </div>
        </div>
    </div>

    <div id="photo-overlay">
        <div id="room-tag">RAUM</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← RAUM VERLASSEN</button>
    </div>

    <script>
        let scene, camera, renderer, playerMesh;
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let audioCtx, doors = [];
        let insideRoom = null;
        let lastPlayerPos = new THREE.Vector3();

        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -150, xMax: -100, zMin: -60, zMax: -20 },
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -150, xMax: -100, zMin: 40, zMax: 80 },
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 100, xMax: 150, zMin: -60, zMax: -20 },
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 100, xMax: 150, zMin: 40, zMax: 80 },
            { name: "BALKON", img: "balkon.jpg", xMin: -40, xMax: 40, zMin: -150, zMax: -110 }
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 140, 200); 

            scene.add(new THREE.AmbientLight(0xfff6e0, 0.6));
            const spot1 = new THREE.PointLight(0xffffff, 0.7, 400); spot1.position.set(0, 100, -50); scene.add(spot1);
            const spot2 = new THREE.PointLight(0xffffff, 0.5, 400); spot2.position.set(0, 100, 50); scene.add(spot2);

            const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a3525, roughness: 0.3, metalness: 0.1 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 300), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.y = -40; scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0xefefef, roughness: 0.8 });
            const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(300, 100), wallMat); leftWall.position.set(-100, 10, 0); leftWall.rotation.y = Math.PI/2; scene.add(leftWall);
            const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(300, 100), wallMat); rightWall.position.set(100, 10, 0); rightWall.rotation.y = -Math.PI/2; scene.add(rightWall);
            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(200, 100), wallMat); backWall.position.set(0, 10, -150); scene.add(backWall);

            buildDoorsAndSigns();

            playerMesh = new THREE.Group();
            playerMesh.position.set(0, -40, 110);
            scene.add(playerMesh);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
            window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
            window.addEventListener('resize', onWindowResize);
        }

        function buildHumanAvatar(gender) {
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a2f4c, roughness: 0.7 });
            const shoeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            
            const shirtColor = (gender === 'frau') ? 0xcc4466 : 0x2277aa;
            const hairColor = (gender === 'frau') ? 0xaa6633 : 0x332211;
            
            const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.6 });
            const hairMat = new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.8 });

            const legL = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.5, 12, 12), pantsMat); legL.position.set(-2.5, 6, 0);
            const legR = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.5, 12, 12), pantsMat); legR.position.set(2.5, 6, 0);
            const shoeL = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.5, 4), shoeMat); shoeL.position.set(-2.5, 0.75, 1);
            const shoeR = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.5, 4), shoeMat); shoeR.position.set(2.5, 0.75, 1);
            playerMesh.add(legL, legR, shoeL, shoeR);

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(4, 3.5, 14, 16), shirtMat);
            torso.position.y = 19;
            playerMesh.add(torso);

            const neck = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2, 12), skinMat); neck.position.y = 26;
            const head = new THREE.Mesh(new THREE.SphereGeometry(3.8, 16, 16), skinMat); head.position.y = 30;
            playerMesh.add(neck, head);

            if (gender === 'frau') {
                const hairTop = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), hairMat); hairTop.position.set(0, 31, -0.5);
                const hairBack = new THREE.Mesh(new THREE.BoxGeometry(7.8, 8, 3), hairMat); hairBack.position.set(0, 28, -2.5);
                playerMesh.add(hairTop, hairBack);
            } else {
                const hairTop = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 8), hairMat); hairTop.position.set(0, 31.2, 0);
                playerMesh.add(hairTop);
            }

            const armL = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1, 11, 12), shirtMat); armL.position.set(-5.5, 18, 0); armL.rotation.z = 0.05;
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1, 11, 12), shirtMat); armR.position.set(5.5, 18, 0); armR.rotation.z = -0.05;
            playerMesh.add(armL, armR);
        }

        function buildDoorsAndSigns() {
            const doorGeo = new THREE.BoxGeometry(4, 70, 35);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x2d1f18, roughness: 0.6 });

            const doorPositions = [
                { x: -98, y: -5, z: -40, ry: 0, label: "BADEZIMMER" },
                { x: -98, y: -5, z: 60,  ry: 0, label: "ZIMMER 1" },
                { x: 98,  y: -5, z: -40, ry: 0, label: "ZIMMER 2" },
                { x: 98,  y: -5, z: 60,  ry: 0, label: "ZIMMER 3" },
                { x: 0,   y: -2, z: -148, ry: Math.PI/2, label: "BALKON" }
            ];

            doorPositions.forEach(pos => {
                const door = new THREE.Mesh(doorGeo, doorMat);
                door.position.set(pos.x, pos.y, pos.z);
                door.rotation.y = pos.ry;
                scene.add(door);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d'); canvas.width = 256; canvas.height = 64;
                ctx.fillStyle = '#111116'; ctx.fillRect(0,0,256,64);
                ctx.strokeStyle = '#00ddff'; ctx.lineWidth = 3; ctx.strokeRect(2,2,252,60);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign='center'; ctx.fillText(pos.label, 128, 40);

                const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(30, 7.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
                labelMesh.position.set(pos.x + (pos.x < 0 ? 2 : (pos.x > 0 ? -2 : 0)), 45, pos.z + (pos.z === -148 ? 2 : 0));
                if(pos.x !== 0) labelMesh.rotation.y = pos.x > 0 ? -Math.PI/2 : Math.PI/2;
                scene.add(labelMesh);
            });
        }

        function startGame(gender) {
            document.getElementById('blocker').style.display = 'none';
            buildHumanAvatar(gender);
            initAudio();
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [261.63, 293.66, 329.63, 349.23, 392.00];
            setInterval(() => {
                if (insideRoom) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)] / 2, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 5.1);
            }, 4500);
        }

        function playDiscoverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponential
