<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Immobilien Simulator</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Courier New', Courier, monospace; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Minecraft-Style Fadenkreuz */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); }
        #crosshair::before { top: 6px; left: 0; width: 14px; height: 2px; }
        #crosshair::after { top: 0; left: 6px; width: 2px; height: 14px; }

        /* Start-Bildschirm / Klick-Zwang für Audio & Maus-Lock */
        #blocker { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(16, 20, 16, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; color: #fff; text-align: center; cursor: pointer; }
        #instructions { padding: 30px; border: 4px solid #555; background: #2c2c2c; box-shadow: inset -4px -4px #111, inset 4px 4px #eee; max-width: 500px; }
        #instructions h2 { color: #55ff55; text-shadow: 2px 2px #005500; margin-top: 0; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #5555ff; border: 2px solid #fff; color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 2px 2px #000; }

        /* 2D-Bild-Overlay (Wenn man einen Raum betritt) */
        #photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 5, 0.95); z-index: 20; justify-content: center; align-items: center; flex-direction: column; }
        #room-photo { max-width: 80vw; max-height: 70vh; border: 6px solid #3c3c3c; box-shadow: 0 20px 50px rgba(0,0,0,0.9); object-fit: contain; background: #222; }
        #room-tag { color: #ffff55; font-size: 28px; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px #555500; }
        #exit-btn { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: bold; color: white; background: #aa0000; border: 3px solid #ff5555; box-shadow: 3px 3px #000; cursor: pointer; }
        #exit-btn:hover { background: #ff5555; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="blocker">
        <div id="instructions">
            <h2>MINECRAFT IMMOBILIE</h2>
            <p><strong>STEUERUNG:</strong><br><br>
               • <strong>W, A, S, D</strong> = Bewegen / Laufen<br>
               • <strong>Maus</strong> = Umsehen (Kopf drehen)<br>
               • <strong>Leertaste</strong> = Springen
            </p>
            <button class="btn">SPIEL STARTEN & MUSIK AN</button>
        </div>
    </div>

    <div id="photo-overlay">
        <div id="room-tag">RAUM GEFUNDEN</div>
        <img id="room-photo" src="" alt="Raumansicht">
        <button id="exit-btn" onclick="leaveRoom()">← ZURÜCK ZUM SPIEL</button>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let prevTime = performance.now();
        let audioCtx, musicNode;

        // Räume und ihre Koordinaten-Zonen in unserer Minecraft-Welt
        const rooms = [
            { name: "BADEZIMMER", img: "bad.jpg", xMin: -90, xMax: -40, zMin: -100, zMax: -40 },     // Links 1
            { name: "ZIMMER 1", img: "zimmer1.jpg", xMin: -90, xMax: -40, zMin: 10, zMax: 70 },      // Links 2
            { name: "ZIMMER 2", img: "zimmer2.jpg", xMin: 40, xMax: 90, zMin: -100, zMax: -40 },     // Rechts 1
            { name: "ZIMMER 3", img: "zimmer3.jpg", xMin: 40, xMax: 90, zMin: 10, zMax: 70 },       // Rechts 2
            { name: "BALKON", img: "balkon.jpg", xMin: -30, xMax: 30, zMin: -150, zMax: -110 }       // Am Ende des Flurs
        ];

        let insideRoom = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x4a75a0); // Minecraft Himmelblau
            scene.fog = new THREE.FogExp2(0x4a75a0, 0.005);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 15, 110); // Start im Flur

            // Lichter für die Block-Schatten
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8); sunLight.position.set(50, 200, 50); scene.add(sunLight);

            // Steuerung laden
            controls = new THREE.PointerLockControls(camera, document.body);
            
            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', function () {
                controls.lock();
                initAudio();
            });

            controls.addEventListener('lock', function () { blocker.style.display = 'none'; });
            controls.addEventListener('unlock', function () { if(!insideRoom) blocker.style.display = 'flex'; });

            scene.add(controls.getObject());

            // Tastatur-Abfrage fürs Laufen
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 220; canJump = false; break;
                }
            };
            const on someKeyUp = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', on someKeyUp);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixeliger Minecraft-Look ohne Glättung
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);

            // --- MINECRAFT BLOCK-APARTMENT BAUEN ---
            buildMinecraftApartment();
        }

        function buildMinecraftApartment() {
            const geo = new THREE.BoxGeometry(10, 10, 10);
            
            // Texturen simulieren über typische Minecraft-Farben
            const matGras = new THREE.MeshStandardMaterial({ color: 0x559933, roughness: 0.9 }); // Boden außen
            const matFlur = new THREE.MeshStandardMaterial({ color: 0x7a5c3d, roughness: 0.8 }); // Holz-Flur
            const matWand = new THREE.MeshStandardMaterial({ color: 0xc3b091, roughness: 1.0 }); // Eichenholz-Wand
            const matStein = new THREE.MeshStandardMaterial({ color: 0x737373, roughness: 1.0 }); // Fliesen für Bad

            // 1. Riesen-Bodenplatte (Erde/Gras)
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), matGras);
            ground.rotation.x = -Math.PI/2; ground.position.y = 0; scene.add(ground);

            // 2. Wohnungsgrundriss aus Blöcken hochziehen
            // Flur-Boden verlegen
            for(let z = -120; z <= 120; z+=10) {
                for(let x = -30; x <= 30; x+=10) {
                    const block = new THREE.Mesh(geo, matFlur); block.position.set(x, 0, z); scene.add(block);
                }
            }

            // Wände hochziehen (Höhe: 3 Blöcke)
            for (let h = 10; h <= 30; h += 10) {
                // Außenwände links & rechts
                for (let z = -130; z <= 130; z += 10) {
                    // Lass Öffnungen frei für die Türen nach Vorgabe!
                    if (z === -70 || z === 40) continue; // Hier kommen die Türen hin

                    const wL = new THREE.Mesh(geo, matWand); wL.position.set(-35, h, z); scene.add(wL);
                    const wR = new THREE.Mesh(geo, matWand); wR.position.set(35, h, z); scene.add(wR);
                }
            }

            // Dekorative Schilder vor den Eingängen platzieren
            createSign(-32, 25, -70, "BAD");
            createSign(-32, 25, 40, "ZIMMER 1");
            createSign(32, 25, -70, "ZIMMER 2");
            createSign(32, 25, 40, "ZIMMER 3");
            createSign(0, 25, -125, "BALKON");
        }

        function createSign(x, y, z, text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d'); canvas.width = 128; canvas.height = 64;
            ctx.fillStyle = '#aa7744'; ctx.fillRect(0,0,128,64);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(2,2,124,60);
            ctx.fillStyle = '#000'; ctx.font = 'bold 16px monospace'; ctx.textAlign='center'; ctx.fillText(text, 64, 38);
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(16, 8), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
            mesh.position.set(x, y, z);
            if(x !== 0) mesh.rotation.y = (x > 0) ? -Math.PI/2 : Math.PI/2;
            scene.add(mesh);
        }

        // --- STIMMUNGSVOLLE MUSIK & AUDIO GENERATOR (Ohne Dateien!) ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Loop für die Hintergrundmusik (Sanfter Ambient Synth im Minecraft-Stil)
            const notes = [196.00, 220.00, 261.63, 293.66, 329.63, 392.00]; // Pentatonische Tonleiter
            let noteIndex = 0;

            setInterval(() => {
                if (insideRoom) return; // Musik stoppen/leiser machen, wenn man ein Foto ansieht
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle'; // Weicher Sound
                osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)] / 2, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.8);
                
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 4);
            }, 3500);
        }

        function playRoomSound() {
            if (!audioCtx) return;
            // Typischer Spiele-Soundeffekt (Aufsteigender Ton beim Entdecken)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.35);
        }

        // --- POSITIONSMESSUNG (Wurde ein Raum betreten?) ---
        function checkRoomCollisions() {
            if (insideRoom) return;

            const pos = controls.getObject().position;

            for (let i = 0; i < rooms.length; i++) {
                const r = rooms[i];
                if (pos.x >= r.xMin && pos.x <= r.xMax && pos.z >= r.zMin && pos.z <= r.zMax) {
                    // Raum betreten!
                    insideRoom = r;
                    controls.unlock(); // Maus freigeben
                    
                    playRoomSound();

                    // 2D Foto aufblenden
                    document.getElementById('room-tag').innerText = r.name;
                    document.getElementById('room-photo').src = r.img;
                    document.getElementById('photo-overlay').style.display = 'flex';
                    break;
                }
            }
        }

        function leaveRoom() {
            document.getElementById('photo-overlay').style.display = 'none';
            insideRoom = null;
            
            // Spielfigur einen Schritt zurück in den sicheren Flur teleportieren
            const pos = controls.getObject().position;
            if (pos.x < 0) pos.x += 15; // Wenn er von links kam, nach rechts schieben
            if (pos.x > 0) pos.x -= 15; // Wenn er von rechts kam, nach links schieben
            if (pos.z < -100) pos.z += 15; // Aus dem Balkon zurückholen
            
            controls.lock(); // Zurück in die Ego-Perspektive
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ENGINE GAME LOOP (Minecraft Physik & Bewegung) ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Dämpfung / Reibung der Bewegung
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // Gravitation / Schwerkraft

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                // Kollision mit dem Minecraft-Boden
                if (controls.getObject().position.y < 15) {
                    velocity.y = 0;
                    controls.getObject().position.y = 15;
                    canJump = true;
                }

                // Prüfen, ob die Figur eine Türschwelle überschritten hat
                checkRoomCollisions();

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
